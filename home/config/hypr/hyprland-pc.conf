monitorv2 {
    output = DP-1
    mode = 2560x1440@165
    position = auto
    scale = 1

    bitdepth = 10
    cm = hdr

    vrr = 1

    sdrbrightness = 1.3
    sdrsaturation = 1.0
}

env=MOZ_ENABLE_WAYLAND,1
env=HYPRLAND_CMD,Hyprland
env=XDG_SESSION_TYPE,wayland
env=XDG_CURRENT_DESKTOP,Hyprland
env=XDG_SESSION_DESKTOP,Hyprland
env=QT_QPA_PLATFORM,wayland;xcb
env=HYPRSHOT_DIR,/home/swomp/Изображения/Скрины/ПК и ноут/
env=VDPAU_DRIVER,radeonsi
env=LIBVA_DRIVER_NAME,radeonsi
env=HYPRCURSOR_THEME,rose-pine-hyprcursor
env=HYPRCURSOR_SIZE,32

exec-once=dbus-update-activation-environment --systemd --all
exec-once=pgrep -x swww-daemon || swww-daemon &
exec-once=pgrep -x swayosd-server || swayosd-server &
exec-once=pgrep -x udiskie || udiskie -n --appindicator --no-automount &
exec-once=pgrep -x lxqt-policykit-agent || lxqt-policykit-agent &
exec-once=pgrep -x waybar || waybar &
exec-once=pgrep -x dunst || dunst &
exec-once=gammastep -c ~/.config/gammastep/config.ini &
exec-once=pgrep -x hypridle || hypridle &
exec-once=wl-paste --watch cliphist store &
exec-once=nextcloud &
exec-once=clipcascade &
exec-once=keepassxc &

render {
    cm_enabled = true
    cm_auto_hdr = 0
}

misc {
  disable_hyprland_logo     = true
  on_focus_under_fullscreen = 2
}

master {
	new_status = slave
}

# Отключение анимаций для выборщика hyprshot
layerrule {
  name = no_anim_for_hyprshot_selection
  no_anim = true
  match:namespace = selection
}

cursor {
       inactive_timeout = 5
}

general {
	border_size=2
	gaps_out=5
	gaps_in=3
	col.inactive_border=rgb(282828)
	col.active_border=rgb(d65d0e)
	layout=master
}

decoration {
	rounding=8
	inactive_opacity=0.9

	blur {
		size=10
		xray=false
	}
}

input {
      sensitivity = 1
      accel_profile = adaptive
      natural_scroll = true
      kb_layout=us,ru
      kb_options=grp:rshift_toggle
}

bind=SUPER,I,exec,pcmanfm-qt
bind=SUPER,U,exec,firefox
bind=SUPER,O,exec,strawberry
bind=SUPER,P,exec,kitty

bind=SUPER,V,exec,bemenu-wallpapers
bind=SUPER,W,exec,bemenu-swww-random
bind=SUPER_CTRL,L,exec,bemenu-lockscreen
bind=SUPER,semicolon,killactive
bind=SUPER,A,exec,wofi
bind=SUPER,E,exec,wlogout
bind=SUPER,J,exec,bemenu-cliphist
bind=,PRINT,exec,bemenu-screenshot

bind=SUPER,1,workspace,1
bind=SUPER,2,workspace,2
bind=SUPER,3,workspace,3
bind=SUPER,4,workspace,4
bind=SUPER,5,workspace,5
bind=SUPER,6,workspace,6
bind=SUPER,7,workspace,7
bind=SUPER,8,workspace,8
bind=SUPER,9,workspace,9

bind=SUPER_CTRL,1,movetoworkspacesilent,1
bind=SUPER_CTRL,2,movetoworkspacesilent,2
bind=SUPER_CTRL,3,movetoworkspacesilent,3
bind=SUPER_CTRL,4,movetoworkspacesilent,4
bind=SUPER_CTRL,5,movetoworkspacesilent,5
bind=SUPER_CTRL,6,movetoworkspacesilent,6
bind=SUPER_CTRL,7,movetoworkspacesilent,7
bind=SUPER_CTRL,8,movetoworkspacesilent,8
bind=SUPER_CTRL,9,movetoworkspacesilent,9

bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow

bind=SUPER,Y,fullscreen,0
bind=SUPER_CTRL,F,togglefloating,active

bind=SUPER,H,movefocus,l
bind=SUPER,T,movefocus,d
bind=SUPER,N,movefocus,u
bind=SUPER,S,movefocus,r
bind=SUPER,M,layoutmsg,focusmaster

bind=SUPER_CTRL,M,layoutmsg,swapwithmaster
bind=SUPER_CTRL,H,movewindow,l
bind=SUPER_CTRL,T,movewindow,d
bind=SUPER_CTRL,N,movewindow,u
bind=SUPER_CTRL,S,movewindow,r

binde=,XF86AudioRaiseVolume,exec,swayosd-client --output-volume 5 --max-volume 100
binde=,XF86AudioLowerVolume,exec,swayosd-client --output-volume -5 --max-volume 100
binde=,XF86AudioMute,exec,swayosd-client --output-volume mute-toggle

bezier=open,0.645,0.045,0.355,1
bezier=close,0.11,0.73,0.93,0.02
bezier=switch,0.68,-0.55,0.265,2
bezier=fade_move,0.46,0.46,0.75,0.77
bezier=windows_move,0.46,0.11,0.22,0.78
bezier=layers_animation,0.87,0.02,0.01,0.97
bezier=layers_fade,0.59,0.59,0.59,0.59

animation=workspaces,1,6,switch,slide
animation=windowsIn,1,4,open,slide
animation=windowsOut,1,4,close,
animation=windowsMove,1,3,windows_move
animation=fadeIn,1,2,default
animation=fadeOut,1,2,default
animation=fadeSwitch,1,2,fade_move
animation=fadeShadow,1,2,default
animation=fadeDim,1,2,default
animation=fadeLayers,1,2,layers_fade
animation=layersIn,0

windowrule= match:title ^(Громкость)$, float on
windowrule= match:title ^(Громкость)$, move (cursor_x-(window_w*0.55)) (cursor_y(window_h*0.03))
windowrule= match:class ^(lxqt-policykit-agent)$, float on
windowrule= match:class ^(org.strawberrymusicplayer.strawberry)$, workspace 2
windowrule= match:class ^(org.kde.ark)$, float on
windowrule= match:title ^(Копирование файлов)$, float on
windowrule= match:title ^(Подтвердить замену файлов)$, float on
windowrule= match:class ^(lxqt-archiver)$, float on
windowrule= match:title ^(Настройки)$, float on
windowrule= match:title ^(Настройки — Strawberry Music Player)$, float on
windowrule= match:title ^(Эквалайзер — Strawberry Music Player)$, float on
windowrule= match:title ^(Менеджер обложек — Strawberry Music Player)$, float on
windowrule= match:title ^(Библиотека)$, float on
